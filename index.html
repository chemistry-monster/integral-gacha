<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>積分ガチャ</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
      padding-top: 50px;
    }
    h1 {
      font-size: 32px;
    }
    button {
      font-size: 18px;
      padding: 8px 16px;
      margin: 10px;
      cursor: pointer;
    }
    .card {
      background: white;
      margin: 15px auto;
      padding: 15px;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    .question {
      font-size: 20px;
      margin-bottom: 10px;
    }
    .answer {
      display: none;
      margin-top: 10px;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>📘 積分ガチャ（3問）</h1>
  <button onclick="gacha()">ガチャを引く</button>

  <div id="questions"></div>

<script>
async function gacha() {

  const res = await fetch("https://integral-gacha-api.tsukkayuu.workers.dev/");
  const data = await res.json();

  const container = document.getElementById("questions");
  container.innerHTML = "";

  data.forEach((item, index) => {

    const div = document.createElement("div");
    div.innerHTML = `
      <p>問${index + 1}: ${item.q}</p>
      <button onclick="this.nextElementSibling.style.display='block'">
        解答を見る
      </button>
      <p style="display:none">${item.a}</p>
    `;

    container.appendChild(div);
  });
}
</script>

</body>
</html>
